<svg width="100%" height="12" viewBox="0 0 1200 12" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <linearGradient id="flow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="20%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="38%"  stop-color="#cc0000" stop-opacity="1"/>
      <stop offset="44%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#cc0000" stop-opacity="1"/>
      <stop offset="62%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="2.2s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="flow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="10%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="25%"  stop-color="#660000" stop-opacity="1"/>
      <stop offset="32%"  stop-color="#ff3333" stop-opacity="1"/>
      <stop offset="37%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="42%"  stop-color="#ff3333" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#330000" stop-opacity="1"/>
      <stop offset="65%"  stop-color="#0a0a0a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="1"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="2.2s" begin="-1.1s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- base dark track -->
  <rect width="1200" height="12" fill="#0a0a0a"/>

  <!-- thin line -->
  <rect y="5" width="1200" height="2" fill="url(#flow1)" filter="url(#glow)"/>

  <!-- second overlapping light stream -->
  <rect y="5" width="1200" height="2" fill="url(#flow2)" opacity="0.7" filter="url(#glow)"/>

  <!-- subtle white spark on top -->
  <rect y="5.5" width="1200" height="1" fill="url(#flow1)" opacity="0.4"/>
</svg>
